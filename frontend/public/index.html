<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HFT Simulator</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <!-- Hammer.js required by chartjs-plugin-zoom for touch/pinch support -->
  <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      font-size: 18px;
      color: #90caf9;
      margin-bottom: 16px;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 10px 16px;
      background: #16213e;
      border-radius: 6px;
      margin-bottom: 6px;
    }

    .controls label { font-size: 13px; }
    #window-slider { width: 180px; vertical-align: middle; }

    #status {
      margin-left: auto;
      font-size: 12px;
      padding: 3px 10px;
      border-radius: 4px;
    }
    #status.connected    { background: #1b5e20; }
    #status.disconnected { background: #b71c1c; }

    /* "Back to Live" button — shown only while exploring (zoomed/panned) */
    #live-btn {
      display: none;
      background: #ff9800;
      color: #1a1a2e;
      border: none;
      border-radius: 4px;
      padding: 4px 12px;
      font-size: 12px;
      font-weight: bold;
      cursor: pointer;
      white-space: nowrap;
    }
    #live-btn:hover { background: #ffc107; }

    .hint {
      font-size: 11px;
      color: #555e7a;
      margin-bottom: 10px;
      padding-left: 2px;
    }

    .chart-wrap {
      background: #16213e;
      border-radius: 6px;
      padding: 14px;
      margin-bottom: 12px;
    }

    /* Show grab cursor to hint at panning */
    .chart-wrap canvas { cursor: grab; }
    .chart-wrap canvas:active { cursor: grabbing; }
  </style>
</head>
<body>

  <h1>HFT Simulator</h1>

  <div class="controls">
    <label>
      Window:&nbsp;
      <input type="range" id="window-slider" min="10" max="500" value="100" step="10">
      &nbsp;<span id="window-val">100</span> ticks
    </label>
    <button id="live-btn">&#8617; Back to Live</button>
    <span id="status" class="disconnected">disconnected</span>
  </div>

  <p class="hint">Scroll to zoom &middot; Drag to pan &middot; Double-click or &#8617; to return to live</p>

  <div class="chart-wrap">
    <canvas id="price-chart" height="280"></canvas>
  </div>

  <div class="chart-wrap">
    <canvas id="spread-chart" height="140"></canvas>
  </div>

  <script>
    // ── Rolling buffer ────────────────────────────────────────────────────────
    class RingBuffer {
      constructor(max) {
        this._max  = max;
        this._data = [];
      }
      push(v) {
        this._data.push(v);
        if (this._data.length > this._max) this._data.shift();
      }
      tail(n) { return this._data.slice(-n); }
    }

    const MAX = 500;

    const tickBuf   = new RingBuffer(MAX);
    const bidBuf    = new RingBuffer(MAX);
    const askBuf    = new RingBuffer(MAX);
    const midBuf    = new RingBuffer(MAX);
    const trueBuf   = new RingBuffer(MAX);
    const spreadBuf = new RingBuffer(MAX);

    // ── Live-mode flag ────────────────────────────────────────────────────────
    // When the user zooms or pans we freeze live updates so the viewport stays
    // stable. The ring buffers keep filling in the background; clicking
    // "Back to Live" resets zoom and shows the latest data.
    let liveMode = true;
    const liveBtnEl = document.getElementById('live-btn');

    function setLiveMode(isLive) {
      liveMode = isLive;
      liveBtnEl.style.display = isLive ? 'none' : 'inline-block';
    }

    // ── Zoom/pan callback (shared by both charts) ─────────────────────────────
    const onInteract = () => setLiveMode(false);

    // ── Shared chart options ──────────────────────────────────────────────────
    const axisStyle = { ticks: { color: '#9e9e9e' }, grid: { color: '#2a2a4a' } };

    const baseOptions = {
      animation: false,
      responsive: true,
      plugins: {
        legend: { labels: { color: '#e0e0e0', boxWidth: 12, font: { size: 11 } } },
        zoom: {
          pan: {
            enabled: true,
            mode: 'xy',
            onPanComplete: onInteract,
          },
          zoom: {
            wheel: { enabled: true, speed: 0.08 },
            pinch: { enabled: true },
            mode: 'xy',
            onZoomComplete: onInteract,
          },
          // Don't allow panning/zooming beyond the original data range
          limits: {
            x: { min: 'original', max: 'original', minRange: 5 },
            y: { min: 'original', max: 'original' },
          },
        },
      },
      scales: {
        x: { ...axisStyle, ticks: { ...axisStyle.ticks, maxTicksLimit: 10 } },
        y: { ...axisStyle },
      },
    };

    // ── Price chart ───────────────────────────────────────────────────────────
    const priceChart = new Chart(document.getElementById('price-chart'), {
      type: 'line',
      data: {
        labels: [],
        datasets: [
          {
            label: 'Mid price',
            data: [],
            borderColor: '#2196f3',
            borderWidth: 2,
            pointRadius: 0,
            fill: false,
          },
          {
            label: 'True price',
            data: [],
            borderColor: '#ff9800',
            borderWidth: 2,
            borderDash: [6, 3],
            pointRadius: 0,
            fill: false,
          },
          {
            label: 'Ask',
            data: [],
            borderColor: 'transparent',
            backgroundColor: 'rgba(76,175,80,0.15)',
            pointRadius: 0,
            fill: '+1',
          },
          {
            label: 'Bid',
            data: [],
            borderColor: 'transparent',
            pointRadius: 0,
            fill: false,
          },
        ],
      },
      options: {
        ...baseOptions,
        scales: {
          ...baseOptions.scales,
          y: { ...axisStyle, title: { display: true, text: 'Price', color: '#9e9e9e' } },
        },
      },
    });

    // ── Spread chart ──────────────────────────────────────────────────────────
    const spreadChart = new Chart(document.getElementById('spread-chart'), {
      type: 'line',
      data: {
        labels: [],
        datasets: [{
          label: 'Bid-ask spread',
          data: [],
          borderColor: '#e91e63',
          borderWidth: 1.5,
          pointRadius: 0,
          fill: false,
        }],
      },
      options: {
        ...baseOptions,
        scales: {
          ...baseOptions.scales,
          y: { ...axisStyle, title: { display: true, text: 'Spread (ticks)', color: '#9e9e9e' } },
        },
      },
    });

    // ── Reset zoom helper ─────────────────────────────────────────────────────
    function resetToLive() {
      priceChart.resetZoom();
      spreadChart.resetZoom();
      setLiveMode(true);
      redraw();
    }

    liveBtnEl.addEventListener('click', resetToLive);

    // Double-clicking either chart also resets to live
    document.getElementById('price-chart').addEventListener('dblclick', resetToLive);
    document.getElementById('spread-chart').addEventListener('dblclick', resetToLive);

    // ── Window slider ─────────────────────────────────────────────────────────
    const slider    = document.getElementById('window-slider');
    const windowVal = document.getElementById('window-val');

    slider.addEventListener('input', () => {
      windowVal.textContent = slider.value;
      // Changing the window slider exits explore mode and snaps back to live
      resetToLive();
    });

    // ── Redraw ────────────────────────────────────────────────────────────────
    // Only updates chart data when in live mode; ring buffers still fill while
    // the user is exploring so they see fresh data when they return.
    function redraw() {
      if (!liveMode) return;

      const n = Number(slider.value);
      const labels = tickBuf.tail(n);

      priceChart.data.labels           = labels;
      priceChart.data.datasets[0].data = midBuf.tail(n);
      priceChart.data.datasets[1].data = trueBuf.tail(n);
      priceChart.data.datasets[2].data = askBuf.tail(n);
      priceChart.data.datasets[3].data = bidBuf.tail(n);
      priceChart.update('none');

      spreadChart.data.labels           = labels;
      spreadChart.data.datasets[0].data = spreadBuf.tail(n);
      spreadChart.update('none');
    }

    // ── WebSocket connection ──────────────────────────────────────────────────
    const statusEl = document.getElementById('status');

    function connect() {
      const ws = new WebSocket(`ws://${window.location.host}`);

      ws.onopen = () => {
        statusEl.textContent = 'connected';
        statusEl.className   = 'connected';
      };

      ws.onmessage = ({ data }) => {
        if (!data.startsWith('TICK:')) return;
        const parts = data.slice(5).split(',').map(Number);
        if (parts.length !== 5 || parts.some(isNaN)) return;

        const [tick_n, bid, ask, mid, true_p] = parts;

        tickBuf.push(tick_n);
        bidBuf.push(bid);
        askBuf.push(ask);
        midBuf.push(mid);
        trueBuf.push(true_p);
        spreadBuf.push(ask - bid);

        redraw();
      };

      ws.onclose = () => {
        statusEl.textContent = 'disconnected — reconnecting…';
        statusEl.className   = 'disconnected';
        setTimeout(connect, 2000);
      };

      ws.onerror = () => ws.close();
    }

    connect();
  </script>
</body>
</html>
